version: '3.8'

services:
  ai-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowledge_hub_ai_standalone
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - knowledge_net

networks:
  knowledge_net:
    driver: bridge
