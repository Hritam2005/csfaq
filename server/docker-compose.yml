
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowledge_hub_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - knowledge_net

  redis:
    image: redis:alpine
    container_name: knowledge_hub_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - knowledge_net

networks:
  knowledge_net:
    driver: bridge

volumes:
  redis_data:
